<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>소곤 · 탐색 탭 아이콘 후보</title>
<style>
  :root{--main:#DB6A85;--off:#b6b0bb;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Pretendard',-apple-system,BlinkMacSystemFont,'Segoe UI','Apple SD Gothic Neo',sans-serif;
    background:#15131a;color:#e8e8ea;padding:44px 22px 70px;}
  .wrap{max-width:980px;margin:0 auto;}
  header{text-align:center;margin-bottom:8px;}
  header h1{font-size:25px;font-weight:800;letter-spacing:-0.02em;}
  header p{color:#9a9aa2;font-size:13.5px;margin-top:8px;}
  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;margin-top:32px;}
  @media(max-width:760px){.grid{grid-template-columns:repeat(2,1fr);}}
  @media(max-width:480px){.grid{grid-template-columns:1fr;}}
  .card{background:#1b1922;border:1px solid #2a2731;border-radius:18px;padding:20px 14px 16px;text-align:center;}
  .card.cur{border-color:#3a2a31;}
  .states{display:flex;justify-content:center;gap:26px;margin-bottom:14px;}
  .st{display:flex;flex-direction:column;align-items:center;gap:5px;}
  .st .ico svg{width:27px;height:27px;}
  .st.off .ico{color:var(--off);}
  .st.on .ico{color:var(--main);}
  .st .lab{font-size:10px;}
  .st.off .lab{color:var(--off);}
  .st.on .lab{color:var(--main);font-weight:700;}
  .nm{font-size:14.5px;font-weight:800;}
  .nm .tag{display:inline-block;font-size:10px;color:#8f8a97;font-weight:600;margin-left:4px;}
  .desc{font-size:11.5px;color:#a7a2af;line-height:1.5;margin-top:6px;min-height:34px;}
  .num{font-size:10.5px;color:#7e7a86;letter-spacing:.08em;margin-bottom:7px;}
  .foot{margin-top:30px;text-align:center;color:#8f8a97;font-size:13px;line-height:1.7;
    border:1px solid #2a2731;border-radius:14px;padding:15px 20px;background:#1b1922;}
  .foot b{color:var(--main);}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>탐색 탭 아이콘 후보</h1>
    <p>왼쪽 회색 = 비활성, 오른쪽 로즈 = 활성 상태 · outline 스타일로 다른 탭과 통일</p>
  </header>

  <div class="grid" id="grid"></div>

  <div class="foot">
    마음에 드는 번호를 알려주세요. 선택한 아이콘으로 <b>탐색 탭을 교체</b>해 드릴게요.
  </div>
</div>

<script>
const SW='fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"';
const icons=[
  {n:'불꽃', tag:'현재', cur:true, desc:'뜨겁게 떠오르는 인연. 데이팅 앱의 클래식.',
   svg:`<path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"/>`},
  {n:'카드 스택', tag:'스와이프', desc:'넘기는 프로필 카드. 탐색 화면의 동작을 그대로 표현.',
   svg:`<rect x="7" y="3.5" width="13.5" height="17" rx="2.6"/><path d="M4 8v10.5A2.5 2.5 0 0 0 6.5 21H15"/>`},
  {n:'컴퍼스', tag:'탐험', desc:'새로운 인연을 찾아 나서는 탐험의 느낌.',
   svg:`<circle cx="12" cy="12" r="9"/><polygon points="16 8 13.4 13.4 8 16 10.6 10.6 16 8"/>`},
  {n:'반짝임', tag:'발견', desc:'오늘의 새로운 인연을 반짝 발견.',
   svg:`<path d="M12 3l1.9 4.8L18.7 9.7l-4.8 1.9L12 16.4l-1.9-4.8L5.3 9.7l4.8-1.9z"/><path d="M18.5 14.5l.8 2 2 .8-2 .8-.8 2-.8-2-2-.8 2-.8z"/>`},
  {n:'하트', tag:'호감', desc:'가장 직관적인 데이팅 상징.',
   svg:`<path d="M19.5 13.6c1.5-1.5 2.5-3.1 2.5-5.1A4.4 4.4 0 0 0 12 6 4.4 4.4 0 0 0 2 8.5c0 2 1 3.6 2.5 5.1L12 21z"/>`},
  {n:'카드+하트', tag:'프로필', desc:'프로필 카드 안의 호감. 탐색의 의미를 한 컷에.',
   svg:`<rect x="5" y="3" width="14" height="18" rx="3"/><path d="M12 15.2c-1.1-.9-3-2-3-3.7A1.6 1.6 0 0 1 12 10.2a1.6 1.6 0 0 1 3 1.3c0 1.7-1.9 2.8-3 3.7z"/>`},
];

document.getElementById('grid').innerHTML=icons.map((c,i)=>`
  <div class="card ${c.cur?'cur':''}">
    <div class="num">0${i+1}</div>
    <div class="states">
      <div class="st off"><span class="ico"><svg viewBox="0 0 24 24" ${SW}>${c.svg}</svg></span><span class="lab">탐색</span></div>
      <div class="st on"><span class="ico"><svg viewBox="0 0 24 24" ${SW}>${c.svg}</svg></span><span class="lab">탐색</span></div>
    </div>
    <div class="nm">${c.n}<span class="tag">${c.tag}</span></div>
    <div class="desc">${c.desc}</div>
  </div>`).join('');
</script>
</body>
</html>
