<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>소곤 로고 · 마음을 전하는 말풍선</title>
<style>
  :root{--main:#DB6A85;--light:#EC92A8;--dark:#C0506F;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Pretendard',-apple-system,BlinkMacSystemFont,'Segoe UI','Apple SD Gothic Neo',sans-serif;
    background:#14121a;color:#e8e8ea;padding:44px 22px 70px;}
  .wrap{max-width:900px;margin:0 auto;}
  header{text-align:center;margin-bottom:8px;}
  header h1{font-size:25px;font-weight:800;letter-spacing:-0.02em;}
  header p{color:#9a9aa2;font-size:13.5px;margin-top:8px;}
  .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:22px;margin-top:34px;}
  @media(max-width:520px){.grid{grid-template-columns:1fr;}}
  .card{background:#1c1a24;border:1px solid #2a2732;border-radius:20px;padding:28px 18px 20px;text-align:center;}
  .row{display:flex;align-items:center;justify-content:center;gap:20px;margin-bottom:16px;}
  .icon{width:112px;height:112px;border-radius:28px;position:relative;display:flex;align-items:center;justify-content:center;overflow:hidden;box-shadow:0 14px 30px rgba(219,106,133,.32);flex:0 0 auto;}
  .icon.rose{background:linear-gradient(145deg,#EC92A8 0%,#DB6A85 52%,#C0506F 100%);}
  .icon .sheen{position:absolute;top:-32%;left:-12%;width:80%;height:70%;background:radial-gradient(ellipse at center,rgba(255,255,255,.30),transparent 70%);pointer-events:none;}
  .icon svg{width:64px;height:64px;position:relative;filter:drop-shadow(0 4px 8px rgba(120,20,45,.20));}
  .mini{width:52px;height:52px;border-radius:14px;background:#fff;display:flex;align-items:center;justify-content:center;flex:0 0 auto;box-shadow:0 6px 14px rgba(0,0,0,.12);}
  .mini svg{width:34px;height:34px;}
  .nm{font-size:16px;font-weight:800;}
  .desc{font-size:12px;color:#a7a2af;line-height:1.55;margin-top:7px;}
  .num{font-size:10.5px;color:#7e7a86;letter-spacing:.08em;margin-bottom:10px;}
  .foot{margin-top:32px;text-align:center;color:#8f8a97;font-size:13px;line-height:1.7;border:1px solid #2a2732;border-radius:14px;padding:15px 20px;background:#1c1a24;}
  .foot b{color:var(--main);}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>소곤 로고 · 마음을 전하는 말풍선</h1>
    <p>말풍선 안의 하트가 전달되는 느낌 · 로즈 아이콘 + 흰 배경 미니</p>
  </header>

  <div class="grid">

    <!-- 1. 하트 + 속도선 -->
    <div class="card">
      <div class="num">01</div>
      <div class="row">
        <div class="icon rose"><span class="sheen"></span>
          <svg viewBox="0 0 72 72">
            <rect x="8" y="12" width="56" height="40" rx="15" fill="#fff"/>
            <path d="M24 50 h12 l-6 11 z" fill="#fff"/>
            <g stroke="#F2A6B8" stroke-width="3.2" stroke-linecap="round"><line x1="15" y1="28" x2="24" y2="28"/><line x1="14" y1="36" x2="22" y2="36"/></g>
            <g transform="translate(42,31)"><path d="M0,-2.5 C-3,-8 -10,-7 -10,0.2 C-10,5 0,11 0,11 C0,11 10,5 10,0.2 C10,-7 3,-8 0,-2.5 Z" fill="#DB6A85"/></g>
          </svg>
        </div>
        <div class="mini">
          <svg viewBox="0 0 72 72">
            <rect x="8" y="12" width="56" height="40" rx="15" fill="none" stroke="#DB6A85" stroke-width="4"/>
            <path d="M24 52 h12 l-6 10 z" fill="#DB6A85"/>
            <g stroke="#EFA0B2" stroke-width="3.2" stroke-linecap="round"><line x1="16" y1="28" x2="24" y2="28"/><line x1="15" y1="36" x2="22" y2="36"/></g>
            <g transform="translate(42,31)"><path d="M0,-2.5 C-3,-8 -10,-7 -10,0.2 C-10,5 0,11 0,11 C0,11 10,5 10,0.2 C10,-7 3,-8 0,-2.5 Z" fill="#DB6A85"/></g>
          </svg>
        </div>
      </div>
      <div class="nm">하트 + 속도선</div>
      <div class="desc">말풍선 속 하트가 슝 — 마음이 상대에게 전해지는 느낌.</div>
    </div>

    <!-- 2. 하트가 떠오름 -->
    <div class="card">
      <div class="num">02</div>
      <div class="row">
        <div class="icon rose"><span class="sheen"></span>
          <svg viewBox="0 0 72 72">
            <rect x="10" y="22" width="52" height="34" rx="14" fill="#fff"/>
            <path d="M23 54 h12 l-6 10 z" fill="#fff"/>
            <g transform="translate(36,22)"><path d="M0,-3 C-3.5,-9.5 -12,-8 -12,0.5 C-12,6 0,13 0,13 C0,13 12,6 12,0.5 C12,-8 3.5,-9.5 0,-3 Z" fill="#DB6A85"/></g>
            <path d="M53 13 l1.4 3.2 3.2 1.4 -3.2 1.4 -1.4 3.2 -1.4-3.2 -3.2-1.4 3.2-1.4z" fill="#fff"/>
          </svg>
        </div>
        <div class="mini">
          <svg viewBox="0 0 72 72">
            <rect x="10" y="22" width="52" height="34" rx="14" fill="none" stroke="#DB6A85" stroke-width="4"/>
            <path d="M23 56 h12 l-6 9 z" fill="#DB6A85"/>
            <g transform="translate(36,22)"><path d="M0,-3 C-3.5,-9.5 -12,-8 -12,0.5 C-12,6 0,13 0,13 C0,13 12,6 12,0.5 C12,-8 3.5,-9.5 0,-3 Z" fill="#DB6A85"/></g>
            <path d="M53 13 l1.4 3.2 3.2 1.4 -3.2 1.4 -1.4 3.2 -1.4-3.2 -3.2-1.4 3.2-1.4z" fill="#EC92A8"/>
          </svg>
        </div>
      </div>
      <div class="nm">하트가 떠오름</div>
      <div class="desc">말풍선에서 하트가 반짝 피어오름 — 전해지는 마음.</div>
    </div>

    <!-- 3. 두 말풍선 사이 하트 전달 -->
    <div class="card">
      <div class="num">03</div>
      <div class="row">
        <div class="icon rose"><span class="sheen"></span>
          <svg viewBox="0 0 72 72">
            <rect x="4" y="12" width="25" height="18" rx="7" fill="#fff"/>
            <path d="M10 29 h7 l-1 6 z" fill="#fff"/>
            <rect x="43" y="42" width="25" height="18" rx="7" fill="#fff" opacity=".82"/>
            <path d="M62 59 h-7 l1 6 z" fill="#fff" opacity=".82"/>
            <g fill="#F2A6B8"><circle cx="25" cy="26" r="1.7"/><circle cx="29" cy="30" r="1.3"/></g>
            <g transform="translate(37,36)"><path d="M0,-2.5 C-3,-8 -10,-7 -10,0.2 C-10,5 0,11 0,11 C0,11 10,5 10,0.2 C10,-7 3,-8 0,-2.5 Z" fill="#DB6A85"/></g>
          </svg>
        </div>
        <div class="mini">
          <svg viewBox="0 0 72 72">
            <rect x="4" y="12" width="25" height="18" rx="7" fill="none" stroke="#DB6A85" stroke-width="4"/>
            <path d="M10 30 h7 l-1 6 z" fill="#DB6A85"/>
            <rect x="43" y="42" width="25" height="18" rx="7" fill="none" stroke="#EC92A8" stroke-width="4"/>
            <path d="M62 60 h-7 l1 6 z" fill="#EC92A8"/>
            <g transform="translate(37,36)"><path d="M0,-2.5 C-3,-8 -10,-7 -10,0.2 C-10,5 0,11 0,11 C0,11 10,5 10,0.2 C10,-7 3,-8 0,-2.5 Z" fill="#DB6A85"/></g>
          </svg>
        </div>
      </div>
      <div class="nm">하트 전달</div>
      <div class="desc">두 말풍선 사이로 하트가 오감 — 서로 마음을 주고받음.</div>
    </div>

    <!-- 4. 하트를 건네는 말풍선 -->
    <div class="card">
      <div class="num">04</div>
      <div class="row">
        <div class="icon rose"><span class="sheen"></span>
          <svg viewBox="0 0 72 72">
            <rect x="11" y="10" width="50" height="35" rx="14" fill="#fff"/>
            <g transform="translate(36,26)"><path d="M0,-3 C-3.5,-9.5 -12,-8 -12,0.5 C-12,6 0,13 0,13 C0,13 12,6 12,0.5 C12,-8 3.5,-9.5 0,-3 Z" fill="#DB6A85"/></g>
            <g transform="translate(23,50) scale(.62)"><path d="M0,-3 C-3.5,-9.5 -12,-8 -12,0.5 C-12,6 0,13 0,13 C0,13 12,6 12,0.5 C12,-8 3.5,-9.5 0,-3 Z" fill="#fff"/></g>
          </svg>
        </div>
        <div class="mini">
          <svg viewBox="0 0 72 72">
            <rect x="11" y="10" width="50" height="35" rx="14" fill="none" stroke="#DB6A85" stroke-width="4"/>
            <g transform="translate(36,26)"><path d="M0,-3 C-3.5,-9.5 -12,-8 -12,0.5 C-12,6 0,13 0,13 C0,13 12,6 12,0.5 C12,-8 3.5,-9.5 0,-3 Z" fill="#DB6A85"/></g>
            <g transform="translate(23,50) scale(.62)"><path d="M0,-3 C-3.5,-9.5 -12,-8 -12,0.5 C-12,6 0,13 0,13 C0,13 12,6 12,0.5 C12,-8 3.5,-9.5 0,-3 Z" fill="#DB6A85"/></g>
          </svg>
        </div>
      </div>
      <div class="nm">하트를 건네는 말풍선</div>
      <div class="desc">말풍선 꼬리가 하트로 — 마음을 아래로 건네는 형태.</div>
    </div>

  </div>

  <div class="foot">
    끌리는 번호나 수정 방향(예: 하트를 더 크게 / 속도선 강조)을 알려주세요. 다듬어서 <b>스플래시·로그인에 적용</b>할게요.
  </div>
</div>
</body>
</html>
